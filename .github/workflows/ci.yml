name: CI

on:
  push:
    branches:
    - main
    tags:
    - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout git repository 🕝
      uses: actions/checkout@v4

    - name: Set up python3.12 🐍
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install uv 🚀
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies 🖥
      run: uv sync

    - name: Lint 🎎
      run: make lint

    - name: Check types w/ mypy 📚
      run: make types

  test:
    name: Run tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Checkout git repository 🕝
      uses: actions/checkout@v4

    - name: Set up python ${{ matrix.python-version }} 🐍
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv 🚀
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies 🖥
      run: uv sync --extra s3

    - name: Test code 🔍
      run: make test

    - name: Send Coverage Report 📊
      if: matrix.python-version == 3.12 && matrix.os == 'ubuntu-latest'
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COVERALLS_SERVICE_NAME: github
      run: uv run coveralls
      continue-on-error: true

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout git repository 🕝
      uses: actions/checkout@v4

    - name: Set up python3.12 🐍
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install uv 🚀
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies 🖥
      run: uv sync

    - name: Security scan 🔒
      run: make security

  docs:
    name: Test Docs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout git repository 🕝
      uses: actions/checkout@v4

    - name: Set up Python3.14 🐍
      uses: actions/setup-python@v5
      with:
        python-version: 3.14

    - name: Install uv 🚀
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies 🖥
      run: uv sync --extra docs

    - name: Build docs ⚒️
      run: make docs

